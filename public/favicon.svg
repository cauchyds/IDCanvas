<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    
    <!-- Glass Card Gradient 1 -->
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.9)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.4)" />
    </linearGradient>

    <!-- Glass Card Gradient 2 -->
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.7)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.1)" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Base Rounded Container -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)" />

  <!-- Background Card (offset) -->
  <g transform="translate(16, 22) rotate(-6)">
    <rect width="60" height="40" rx="6" fill="url(#cardGrad2)" stroke="rgba(255,255,255,0.2)" stroke-width="1" filter="url(#shadow)" />
    <rect x="6" y="8" width="12" height="14" rx="2" fill="rgba(255,255,255,0.4)" />
    <rect x="22" y="8" width="30" height="4" rx="2" fill="rgba(255,255,255,0.5)" />
    <rect x="22" y="16" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.3)" />
  </g>

  <!-- Foreground Card (aligned) -->
  <g transform="translate(24, 38)">
    <rect width="60" height="40" rx="6" fill="url(#cardGrad1)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" filter="url(#shadow)" />
    <!-- Photo slot -->
    <rect x="6" y="8" width="12" height="14" rx="2" fill="rgba(79, 70, 229, 0.8)" />
    <!-- Text lines -->
    <rect x="22" y="8" width="30" height="4" rx="2" fill="rgba(79, 70, 229, 0.9)" />
    <rect x="22" y="16" width="20" height="3" rx="1.5" fill="rgba(79, 70, 229, 0.5)" />
    <rect x="22" y="23" width="26" height="3" rx="1.5" fill="rgba(79, 70, 229, 0.3)" />
    <!-- Corner Alignment Indication marks -->
    <path d="M 4 4 L 10 4 M 4 4 L 4 10" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 56 36 L 50 36 M 56 36 L 56 30" stroke="#4F46E5" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
</svg>